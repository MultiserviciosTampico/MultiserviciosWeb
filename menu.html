<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiservicios Tampico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .menu-card {
      text-align: center;
      padding: 30px 20px;
    }

    .menu-card p {
      color: #555;
      margin-bottom: 25px;
    }

    .menu-btn {
      display: block;
      width: 100%;
      text-decoration: none;
      text-align: center;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-sizing: border-box;
    }

    .menu-btn.primary {
      background: #0056d6;
      color: white;
    }

    .menu-btn.secondary {
      background: #e9f0ff;
      color: #0056d6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <img src="LogoMultiservicios.png" alt="Logo de Multiservicios Tampico" class="logo">
      <div class="company-name">Multiservicios Tampico</div>
    </div>

    <div class="card menu-card">
      <h2>Selecciona el documento</h2>
      <p>Genera tu documento desde cualquier lugar, rápido y sin rodeos.</p>

      <a href="/proforma" class="menu-btn primary">Generar Proforma</a>
      <a href="/orden-trabajo" class="menu-btn secondary">Generar Orden de Trabajo</a>
    </div>
  </div>
</body>
</html>
